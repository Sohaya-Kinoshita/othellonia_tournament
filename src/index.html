<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./style.css" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>隊抗戦</title>
</head>

<body>
    <header class="header">
        <div class="header-inner">
            <div class="brand">隊抗戦</div>
            <nav class="nav">
                <a href="./index.html">トップ</a>
                <a href="./teams.html">出場チーム</a>
                <a href="./schedule.html">対戦日程</a>
                <a href="./results.html">対戦結果</a>
                <a href="./deckcheck.html">デッキ判定</a>
                <span id="userInfo"></span>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <h1>大会サイト</h1>
            <p>さまざまな情報を掲載します。</p>
        </div>

        <div class="card">
            <h2>本日の対戦カード</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>時間</th>
                            <th>対戦1</th>
                            <th>対戦2</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>10:00</td>
                            <td>-</td>
                            <td>-</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>大会運営者</h2>
            <ul>
                <li>運営者1</li>
                <li>運営者2</li>
            </ul>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <p>オセロ・Othelloは登録商標です。TM&© Othello,Co. and MegaHouse<br>
                © 2016 DeNA Co.,Ltd.</p>
        </div>
    </footer>
</body>

<script>
    // ログイン状態をチェック
    function checkLogin() {
        const user = localStorage.getItem('user');
        if (!user) {
            window.location.href = './login.html';
            return;
        }

        const userData = JSON.parse(user);
        const userInfo = document.getElementById('userInfo');
        userInfo.innerHTML = `<span style="color: var(--muted);">${userData.id}(${userData.role})</span> | <a href="#" onclick="logout(); return false;">ログアウト</a>`;
    }

    function logout() {
        localStorage.removeItem('user');
        window.location.href = './login.html';
    }

    checkLogin();
</script>

</html>
