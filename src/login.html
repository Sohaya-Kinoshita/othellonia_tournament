<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./style.css" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ログイン</title>
</head>

<body>
    <header class="header">
        <div class="header-inner">
            <div class="brand">隊抗戦</div>
        </div>
    </header>

    <main class="container">
        <div class="card login-card">
            <h1>ログイン</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label for="userId">ユーザーID</label>
                    <input id="userId" type="text" placeholder="ユーザーIDを入力" required />
                </div>
                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input id="password" type="password" placeholder="パスワードを入力" required />
                </div>
                <button type="submit" id="loginBtn">ログイン</button>
                <div id="errorMsg" class="error-msg"></div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <p>オセロ・Othelloは登録商標です。TM&© Othello,Co. and MegaHouse<br>
                © 2016 DeNA Co.,Ltd.</p>
        </div>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('userId').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const response = await fetch('/.netlify/functions/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('user', JSON.stringify({
                        id: userId,
                        role: data.role
                    }));
                    window.location.href = './index.html';
                } else {
                    errorMsg.textContent = data.message || 'ログインに失敗しました';
                }
            } catch (err) {
                errorMsg.textContent = 'エラーが発生しました';
                console.error(err);
            }
        });
    </script>
</body>

</html>
