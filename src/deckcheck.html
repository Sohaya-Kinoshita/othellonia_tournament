<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>デッキ判定</title>
</head>
<body>
  <h1>デッキ判定</h1>

  <label>
    デッキID
    <input id="deckId" type="text" placeholder="例：ABC12345" />
  </label>
  <button id="checkBtn">判定</button>

  <pre id="result"></pre>

  <script>
    const deckIdInput = document.getElementById("deckId");
    const checkBtn = document.getElementById("checkBtn");
    const result = document.getElementById("result");

    checkBtn.addEventListener("click", async () => {
      result.textContent = "判定中...";

      const deckId = deckIdInput.value.trim();
      try {
        const response = await fetch("/api/validateDeck", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ deckId })
        });

        const data = await response.json();

        if (data.ok) {
          result.textContent = "OK：ルール適合";
        } else {
          result.textContent = "NG：\n- " + (data.reasons || []).join("\n- ");
        }
      } catch (e) {
        result.textContent = "通信エラー： " + e;
      }
    });
  </script>
</body>
</html>
