<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./style.css" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>対戦結果</title>
</head>

<body>
    <header class="header">
        <div class="header-inner">
            <div class="brand">隊抗戦</div>
            <nav class="nav">
                <a href="./index.html">トップ</a>
                <a href="./teams.html">出場チーム</a>
                <a href="./schedule.html">対戦日程</a>
                <a href="./results.html">対戦結果</a>
                <a href="./deckcheck.html">デッキ判定</a>
                <span id="userInfo"></span>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <h1>対戦結果</h1>
            <p>最新の対戦結果を表示します。</p>

            <div class="table-wrap mt-12">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>時間</th>
                            <th>対戦1</th>
                            <th>対戦2</th>
                            <th>結果</th>
                            <th>メモ</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>

            <div class="mt-12">
                <h3>チーム集計（勝-敗-分）</h3>
                <div class="table-wrap">
                    <table id="standingsTable">
                        <thead>
                            <tr>
                                <th>チーム</th>
                                <th>勝</th>
                                <th>敗</th>
                                <th>分</th>
                                <th>試合数</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="mt-12">
                <a href="./admin.html">管理画面（結果入力）</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <p>オセロ・Othelloは登録商標です。TM&© Othello,Co. and MegaHouse<br>
                © 2016 DeNA Co.,Ltd.</p>
        </div>
    </footer>
</body>

<script>
    function updateUserInfo() {
        const user = localStorage.getItem('user');
        const userInfo = document.getElementById('userInfo');

        if (user) {
            const userData = JSON.parse(user);
            userInfo.innerHTML = `<span style="color: var(--muted);">${userData.id}(${userData.role})</span> | <a href="#" onclick="logout(); return false;">ログアウト</a>`;
        } else {
            userInfo.innerHTML = `<a href="./login.html">ログイン</a>`;
        }
    }

    function logout() {
        localStorage.removeItem('user');
        updateUserInfo();
    }

    updateUserInfo();
</script>

<script>
    async function loadResults() {
        let data = null;
        const raw = localStorage.getItem('results');
        if (raw) {
            try { data = JSON.parse(raw); } catch (e) { data = null; }
        }
        if (!data) {
            try {
                const res = await fetch('./data/results.json');
                data = await res.json();
            } catch (e) { data = { matches: [] }; }
        }
        return data;
    }

    function renderResults(data) {
        const tbody = document.querySelector('#resultsTable tbody');
        tbody.innerHTML = '';
        if (!data || !data.matches || data.matches.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5">対戦結果が登録されていません</td></tr>';
            return;
        }
        data.matches.forEach(m => {
            const tr = document.createElement('tr');
            const resultText = m.winner ? (m.winner === 'A' ? (m.team1 + ' 勝') : (m.team2 + ' 勝')) : `${m.score1} - ${m.score2}`;
            tr.innerHTML = `<td>${m.time}</td><td>${m.team1}</td><td>${m.team2}</td><td>${resultText}</td><td>${m.note || ''}</td>`;
            tbody.appendChild(tr);
        });
    }

    function computeStandings(data) {
        const stats = {}; // team -> {win,lose,draw,played}
        (data.matches || []).forEach(m => {
            const t1 = m.team1 || '';
            const t2 = m.team2 || '';
            if (!t1 || !t2) return;
            if (!stats[t1]) stats[t1] = { win: 0, lose: 0, draw: 0, played: 0 };
            if (!stats[t2]) stats[t2] = { win: 0, lose: 0, draw: 0, played: 0 };

            let winner = null;
            if (m.winner === 'A' || m.winner === 'B') winner = m.winner;
            else if (typeof m.score1 === 'number' && typeof m.score2 === 'number') {
                if (m.score1 > m.score2) winner = 'A';
                else if (m.score2 > m.score1) winner = 'B';
                else winner = null;
            }

            stats[t1].played += 1;
            stats[t2].played += 1;
            if (winner === 'A') { stats[t1].win += 1; stats[t2].lose += 1; }
            else if (winner === 'B') { stats[t2].win += 1; stats[t1].lose += 1; }
            else { stats[t1].draw += 1; stats[t2].draw += 1; }
        });
        const rows = Object.keys(stats).map(team => ({ team, ...stats[team] }));
        rows.sort((a, b) => b.win - a.win || a.lose - b.lose || b.played - a.played);
        return rows;
    }

    function renderStandings(data) {
        const tbody = document.querySelector('#standingsTable tbody');
        tbody.innerHTML = '';
        const rows = computeStandings(data);
        if (rows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5">集計できるデータがありません</td></tr>';
            return;
        }
        rows.forEach(r => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${r.team}</td><td>${r.win}</td><td>${r.lose}</td><td>${r.draw}</td><td>${r.played}</td>`;
            tbody.appendChild(tr);
        });
    }

    (async () => {
        const data = await loadResults();
        renderResults(data);
        renderStandings(data);
    })();
</script>

</html>
